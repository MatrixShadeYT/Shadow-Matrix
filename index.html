<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VTuber Core</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}
</style>
</head>

<body>

<canvas id="pixiCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

<script type="module">

const app = new PIXI.Application({
    view: document.getElementById("pixiCanvas"),
    resizeTo: window,
    transparent: true,
    antialias: true
});

// =====================================================
// LOAD MODEL
// =====================================================

const Live2DModel = PIXI.live2d.Live2DModel;

const model = await Live2DModel.from(
    "./models/Hiyori/Hiyori.model3.json"
);

app.stage.addChild(model);

// center
model.anchor.set(0.5);
model.x = window.innerWidth / 2;
model.y = window.innerHeight * 0.75;
model.scale.set(0.25);

// expose for debugging
window.model = model;

// =====================================================
// STATE
// =====================================================

let mouseX = 0;
let mouseY = 0;

let smoothX = 0;
let smoothY = 0;

let dragging = false;

// =====================================================
// PARAM SYSTEM
// =====================================================

const core = model.internalModel.coreModel;

function setParam(id, value, w = 0.15) {
    const i = core.getParameterIndex(id);
    if (i === -1) return;

    const current = core.getParameterValueByIndex(i);
    core.setParameterValueByIndex(i, current + (value - current) * w);
}

// =====================================================
// INPUT
// =====================================================

window.addEventListener("mousemove", (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
});

// drag model
model.eventMode = "static";
model.cursor = "grab";

model.on("pointerdown", () => {
    dragging = true;
    model.cursor = "grabbing";
});

window.addEventListener("pointerup", () => {
    dragging = false;
    model.cursor = "grab";
});

window.addEventListener("pointermove", (e) => {
    if (!dragging) return;

    model.x += e.movementX;
    model.y += e.movementY;
});

// zoom
window.addEventListener("wheel", (e) => {
    let s = model.scale.x - e.deltaY * 0.001;
    s = Math.max(0.1, Math.min(1.5, s));
    model.scale.set(s);
});

// =====================================================
// EXPRESSIONS
// =====================================================

async function setExpression(name) {
    try {
        const list =
            model.internalModel.motionManager.expressionManager.expressions;

        const found =
            list.find(e => e.name.includes(name));

        if (found) model.expression(found.name);

    } catch {}
}

window.addEventListener("keydown", (e) => {
    if (e.key === "1") setExpression("F01");
    if (e.key === "2") setExpression("F02");

    if (e.key === "m") {
        try { model.motion("TapBody"); } catch {}
    }
});

// =====================================================
// LOOP (VTUBER CORE)
// =====================================================

function animate() {

    requestAnimationFrame(animate);

    // smooth tracking
    smoothX += (mouseX - smoothX) * 0.1;
    smoothY += (mouseY - smoothY) * 0.1;

    const t = performance.now() * 0.001;

    // head
    setParam("ParamAngleX", smoothX * 30);
    setParam("ParamAngleY", -smoothY * 30);
    setParam("ParamAngleZ", smoothX * 10);

    // eyes
    setParam("ParamEyeBallX", smoothX, 0.35);
    setParam("ParamEyeBallY", -smoothY, 0.35);

    // body sway
    setParam("ParamBodyAngleX", smoothX * 8, 0.05);

    // breathing
    setParam("ParamBreath", (Math.sin(t * 2) + 1) * 0.5, 0.05);

    // idle sway
    setParam("ParamAngleY", Math.sin(t) * 2, 0.02);

    // update model
    model.update?.(0.016);
}

animate();

</script>

</body>
</html>
